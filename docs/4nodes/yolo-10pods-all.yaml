# ==============================================================================
# yolo-10pods-all.yaml
#
# YOLO11 TensorRT Benchmark Workload
#
# This manifest deploys 10 TensorRT-accelerated YOLO11 inference Pods
# for benchmarking Kubernetes scheduling algorithms.
#
# Models
#   - YOLO11 Classification
#   - YOLO11 Detection
#   - YOLO11 Segmentation
#   - YOLO11 OBB
#   - YOLO11 Pose
#
# Runtime
#   - TensorRT
#   - NVIDIA Jetson Orin
#   - Kubernetes
#
# ==============================================================================
=========================================
# [SET 1] YOLO 5종 파드 (1~5번)
# ==========================================
apiVersion: v1
kind: Pod
metadata:
  name: yolo-cls-1
  labels: { app: yolo-heavy, instance: "1" }
spec:
  restartPolicy: Never
  containers:
    - name: yolo-gpu
      image: ultralytics/ultralytics:latest-jetson-jetpack6
      securityContext: {privileged: true}
      command: ["/bin/bash", "-c"]
      args: ["cd /mnt/yolo && python3 -c \"from ultralytics import YOLO; model = YOLO('models/yolo11n-cls.engine'); model.predict(source='data/classify_src', imgsz=640, device=0, save=True, project='runs', name='cls_1')\" && sleep 3600"]
      resources: {limits: {nvidia.com/gpu: 1}}
      volumeMounts: [{name: yolo-shared, mountPath: /mnt/yolo}]
  volumes: [{name: yolo-shared, persistentVolumeClaim: {claimName: yolo-shared-pvc}}]
---
